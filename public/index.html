<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>

    <!-- react-native-web style reset (verbatim from Expo's default web template;
         do not change without checking RN-web layout). -->
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>

    <!--
      App shell splash (CodySwannGT/expostarter#25; proven downstream in
      geminisportsai/frontend-v2 b4ef8e014 — FCP 2,555ms → 1,204ms — and
      TunnlAI/frontend PR #54 — FCP → 753ms). web.output defaults to SPA
      ("single"), so the shipped index.html body is otherwise empty and First
      Contentful Paint waits for the whole JS bundle to download, execute,
      and mount React. This is the template Expo uses to generate index.html
      (+html.tsx does NOT apply in SPA mode; Expo reads public/index.html
      first, then injects the JS/CSS). The markup below paints at HTML-parse
      time, producing FCP *before* any JS runs. Everything is inline (CSS + a
      base64 logo, system font) — zero network dependencies. Light/dark
      follow the OS color scheme (the only theme signal available pre-JS):
      backgrounds mirror the design system's background-0 tokens
      (src/components/ui/gluestack-ui-provider/config.ts — #ffffff /
      rgb(18 18 18)) and the spinner the primary-500 tokens (#333333 /
      #f0f0f0), so the handoff to the mounted app does not flash. #app-splash
      is a sibling of #root (React never touches it); the RootLayout web
      effect removes it once React mounts, so it can never intercept clicks
      afterwards.

      RE-BRANDING when instantiating this template:
      1. Logo — regenerate the data URI from your own icon:
           sips -Z 96 assets/images/icon.png --out /tmp/splash-logo-96.png
           base64 -i /tmp/splash-logo-96.png
         (or: magick assets/images/icon.png -resize 96x96 /tmp/splash-logo-96.png)
         and paste the output into the img src below after "base64,".
      2. Colors — keep the backgrounds/spinner in sync with your background-0
         and primary-500 token values per scheme.
      3. Keep the %LANG_ISO_CODE% / %WEB_TITLE% placeholders — Expo fills
         them at export time.
    -->
    <!-- With JS disabled nothing ever removes the splash and it would sit
         over the noscript message forever — hide it up front. -->
    <noscript>
      <style>
        #app-splash {
          display: none;
        }
      </style>
    </noscript>
    <style id="app-splash-style">
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background-color: #ffffff;
      }
      #app-splash .app-splash__logo {
        width: 48px;
        height: 48px;
        border-radius: 10px;
      }
      #app-splash .app-splash__spinner {
        width: 26px;
        height: 26px;
        border-radius: 9999px;
        border: 3px solid rgba(0, 0, 0, 0.12);
        border-top-color: #333333;
        animation: app-splash-spin 0.8s linear infinite;
      }
      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .app-splash__spinner {
          animation: none;
        }
      }
      @media (prefers-color-scheme: dark) {
        #app-splash {
          background-color: rgb(18 18 18);
        }
        #app-splash .app-splash__spinner {
          border-color: rgba(255, 255, 255, 0.16);
          border-top-color: #f0f0f0;
        }
      }
    </style>
  </head>
